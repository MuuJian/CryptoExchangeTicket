<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Index Constituents</title>
  <style>
    :root {
      --bg: #f4f6f7;
      --panel: #ffffff;
      --head: #edf2f4;
      --ink: #26313a;
      --muted: #75808b;
      --line: #dfe5e8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
    }

    .shell {
      width: min(100vw - 20px, 1760px);
      margin: 0 auto;
      padding: 16px 0 28px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 3.8vw, 56px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    input, select, button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      font: inherit;
    }

    button {
      background: #26313a;
      color: #fff;
      border-color: #26313a;
      cursor: pointer;
      white-space: nowrap;
    }

    .ghost-btn {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    .table-wrap {
      max-height: calc(100vh - 150px);
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-variant-numeric: tabular-nums;
    }

    .index-table {
      min-width: 1250px;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--head);
      color: #39434d;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .sort-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      justify-content: flex-start;
      max-width: 100%;
      min-width: 0;
    }

    .sort-arrows {
      display: none;
      flex: 0 0 auto;
      height: 0;
      width: 0;
    }

    th.sorted-asc .sort-arrows,
    th.sorted-desc .sort-arrows {
      display: inline-block;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
    }

    th.sorted-asc .sort-arrows { border-bottom: 6px solid #1f6fb2; }
    th.sorted-desc .sort-arrows { border-top: 6px solid #1f6fb2; }

    tbody tr:hover { background: #f8faf9; }

    .symbol {
      font-weight: 900;
      font-size: 16px;
    }

    .symbol-link {
      color: inherit;
      text-decoration: none;
    }

    .symbol-link:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .weight-cell {
      font-weight: 900;
    }

    .index-table th:nth-child(1), .index-table td:nth-child(1) { width: 70px; }
    .index-table th:nth-child(2), .index-table td:nth-child(2) { width: 150px; }
    .index-table th:nth-child(n+3), .index-table td:nth-child(n+3) {
      text-align: right;
      width: 114px;
    }

    .empty { padding: 28px; text-align: left; color: var(--muted); }

    @media (max-width: 980px) {
      header { flex-direction: column; align-items: stretch; }
      .toolbar { align-items: stretch; flex-direction: column; }
    }

    @media (max-width: 640px) {
      .shell { width: calc(100vw - 12px); padding-top: 10px; }
      th, td { padding: 10px 8px; font-size: 13px; }
      input, select, button { width: 100%; }
      .controls { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>指数组成权重</h1>
        <div class="sub">独立扫描 Binance Futures 指数来源权重，查到哪个币先显示哪个币。</div>
      </div>
    </header>

    <section class="panel">
      <div class="toolbar">
        <div>
          <strong>Index Constituents</strong>
          <div class="sub" id="indexStatusText">准备扫描。</div>
        </div>
        <div class="controls">
          <input id="indexSearchInput" placeholder="Search symbol / source">
          <select id="indexSourceFilter">
            <option value="">来源: 全部</option>
          </select>
          <button id="indexRefreshBtn" class="ghost-btn" type="button">刷新</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="index-table">
          <thead>
            <tr id="indexConstituentsHeader"></tr>
          </thead>
          <tbody id="indexConstituentsBody">
            <tr><td colspan="8" class="empty">准备扫描。</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script type="module" src="/static/indexConstituents.js"></script>
</body>
</html>
